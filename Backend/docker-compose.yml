version: '3.8'

services:
  api-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    networks:
      - gateway-network
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./jwt-auth.lua:/etc/nginx/jwt-auth.lua:ro
    depends_on:
      - auth-api
      - orders-api
      - delivery-api
      - inventory-api
      - warehouse-api
      - shipping-api
      - route-api
      - billing-api
      - vendor-api
      - analytics-api
      - notification-api
    platform: linux/arm64
    build:
      dockerfile: Dockerfile
      args:
        - JWT_SECRET=4fcfc25be07f50a0f0f6214df8b495c0

  auth-api:
    build:
      context: ./auth_api
      dockerfile: Dockerfile
    container_name: auth-api
    env_file:
      - ./auth_api/.env
    depends_on:
      - users-db
    networks:
      - gateway-network
    ports:
      - "3000"

  users-db:
    image: postgres:latest
    container_name: users-db
    networks:
      - gateway-network
    environment:
      - POSTGRES_DB=users_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"

  orders-api:
    build:
      context: ./orders_api
      dockerfile: Dockerfile
    container_name: orders-api
    env_file:
      - ./orders_api/.env
    depends_on:
      - orders-mongo
      - orders-db
      - rabbitmq
    environment:
      - DB_CONNECTION_STRING=user=admin password=pass dbname=orders_db sslmode=disable host=orders-db port=5433
      - JWT_SECRET=4fcfc25be07f50a0f0f6214df8b495c0
      - MONGO_URI=mongodb://admin:pass@orders-mongo:27017
      - MONGO_DATABASE=orders_mongo_db
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
    networks:
      - gateway-network
    ports:
      - "3000"

  orders-db:
    image: postgres:latest
    container_name: orders-db
    networks:
      - gateway-network
    environment:
      - POSTGRES_DB=orders_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=pass
    ports:
      - "5433:5433"
    command: -p 5433

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    networks:
      - gateway-network
    ports:
      - "5672:5672"       # AMQP Protocol
      - "15672:15672"     # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

# ===== Placeholder para novos microserviços =====

  inventory-api:
    build:
      context: ./inventory_api
      dockerfile: Dockerfile
    container_name: inventory-api
    depends_on:
      - rabbitmq
    environment:
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
    networks:
      - gateway-network
    ports:
      - "3001"

  warehouse-api:
    build:
      context: ./warehouse_api
      dockerfile: Dockerfile
    container_name: warehouse-api
    depends_on:
      - rabbitmq
    environment:
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
    networks:
      - gateway-network
    ports:
      - "3002"

  shipping-api:
    build:
      context: ./shipping_api
      dockerfile: Dockerfile
    container_name: shipping-api
    depends_on:
      - rabbitmq
    environment:
      - RABBIT_CONNECTION=amqp://guest:guest@rabbitmq:5672/
    networks:
      - gateway-network
    ports:
      - "3003"

volumes:
  rabbitmq_data:

networks:
  gateway-network:
    driver: bridge
